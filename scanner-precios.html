<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a0a0f">
<title>ScanPrice</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0f;--sur:#13131a;--sur2:#1c1c26;
  --acc:#00e5ff;--red:#ff3d71;--pur:#a259ff;
  --txt:#f0f0ff;--dim:#6b6b8a;--bdr:rgba(255,255,255,0.08);
  --fd:'Syne',sans-serif;--fm:'Space Mono',monospace;
}
html,body{height:100%;background:var(--bg);color:var(--txt);font-family:var(--fd);overflow:hidden}
#app{display:flex;flex-direction:column;height:100dvh;max-width:480px;margin:0 auto}

header{display:flex;align-items:center;justify-content:space-between;padding:18px 20px 10px;flex-shrink:0}
.logo{font-size:22px;font-weight:800;letter-spacing:-.5px}.logo b{color:var(--acc)}
.btn-hdr{background:var(--sur2);border:1px solid var(--bdr);color:var(--dim);border-radius:10px;padding:7px 13px;font-family:var(--fd);font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:6px;transition:all .2s}
.btn-hdr:hover{color:var(--acc);border-color:var(--acc)}

main{flex:1;display:flex;flex-direction:column;align-items:center;padding:10px 18px;gap:10px;overflow:hidden}

/* ── SCANNER ── */
#sw{width:100%;flex:1;max-height:310px;position:relative;border-radius:18px;overflow:hidden;background:#000;border:2px solid var(--bdr);transition:border-color .3s,box-shadow .3s}
#sw.on  {border-color:var(--acc);box-shadow:0 0 28px rgba(0,229,255,.22)}
#sw.hit {border-color:#00ff88;box-shadow:0 0 28px rgba(0,255,136,.28)}
#sw.mis {border-color:var(--pur);box-shadow:0 0 28px rgba(162,89,255,.28)}
#vid{width:100%;height:100%;object-fit:cover;display:block}

/* scan frame corners */
.sf{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none}
.sf-box{width:220px;height:100px;position:relative}
.c{position:absolute;width:20px;height:20px;border-color:var(--acc);border-style:solid}
.c.tl{top:0;left:0;border-width:3px 0 0 3px}
.c.tr{top:0;right:0;border-width:3px 3px 0 0}
.c.bl{bottom:0;left:0;border-width:0 0 3px 3px}
.c.br{bottom:0;right:0;border-width:0 3px 3px 0}
.sl{position:absolute;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--acc),transparent);box-shadow:0 0 8px var(--acc);animation:scan 2s ease-in-out infinite;display:none}
@keyframes scan{0%,100%{top:4px;opacity:.3}50%{top:calc(100% - 4px);opacity:1}}

/* idle overlay */
.idle{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:var(--dim);background:var(--sur)}
.idle svg{opacity:.2}
.idle p{font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase}

/* debug bar */
#dbg{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,.6);color:var(--acc);font-family:var(--fm);font-size:10px;padding:4px 8px;display:none;letter-spacing:.5px}

/* ── RESULT ── */
#rc{width:100%;border-radius:16px;background:var(--sur);border:1px solid var(--bdr);padding:14px 18px;flex-shrink:0;transition:all .3s}
#rc.hit{border-color:#00ff88;background:rgba(0,255,136,.05)}
#rc.mis{border-color:var(--red);background:rgba(255,61,113,.05)}
.rlbl{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--dim);margin-bottom:3px}
.rph{font-size:13px;color:var(--dim)}
.rcode{font-family:var(--fm);font-size:11px;color:var(--dim);margin-bottom:2px}
.rprice{font-size:50px;font-weight:800;line-height:1;color:#00ff88;letter-spacing:-2px}
.rmiss{font-size:17px;font-weight:700;color:var(--red)}

/* ── MANUAL ROW ── */
#mr{display:flex;gap:8px;width:100%;flex-shrink:0}
#mc{flex:1;padding:11px 13px;background:var(--sur2);border:1px solid var(--bdr);border-radius:10px;color:var(--txt);font-family:var(--fm);font-size:14px;outline:none;transition:border-color .2s}
#mc:focus{border-color:var(--acc)}
#mc::placeholder{color:var(--dim)}
#bm{padding:11px 14px;background:var(--sur2);border:1px solid var(--bdr);border-radius:10px;color:var(--dim);font-family:var(--fd);font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;transition:all .2s}
#bm:hover{border-color:var(--acc);color:var(--acc)}

/* ── SCAN BUTTON ── */
#bs{width:100%;padding:15px;border-radius:14px;border:none;background:var(--acc);color:#000;font-family:var(--fd);font-size:15px;font-weight:800;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:9px;flex-shrink:0;box-shadow:0 4px 18px rgba(0,229,255,.28)}
#bs:active{transform:scale(.97)}
#bs.on{background:var(--red);box-shadow:0 4px 18px rgba(255,61,113,.28)}

/* ── MODALS ── */
.modal{position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.8);backdrop-filter:blur(6px);display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .25s}
.modal.show{opacity:1;pointer-events:all}
.sheet{width:100%;max-width:480px;background:var(--sur);border-radius:22px 22px 0 0;padding:10px 22px 34px;transform:translateY(100%);transition:transform .3s cubic-bezier(.32,1,.23,1);border-top:1px solid var(--bdr)}
.modal.show .sheet{transform:translateY(0)}
.sheet.sc{max-height:80vh;display:flex;flex-direction:column}
.hdl{width:38px;height:4px;border-radius:2px;background:var(--bdr);margin:0 auto 18px}
.stitle{font-size:19px;font-weight:800;margin-bottom:16px}.stitle span{color:var(--acc)}
.fg{margin-bottom:13px}
.flbl{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--dim);display:block;margin-bottom:6px}
.fin{width:100%;padding:12px 14px;background:var(--sur2);border:1px solid var(--bdr);border-radius:10px;color:var(--txt);font-family:var(--fm);font-size:16px;outline:none;transition:border-color .2s}
.fin:focus{border-color:var(--acc)}
.fin[readonly]{color:var(--dim)}
.bsave{width:100%;padding:14px;background:var(--pur);color:#fff;border:none;border-radius:12px;font-family:var(--fd);font-size:15px;font-weight:800;cursor:pointer;box-shadow:0 4px 18px rgba(162,89,255,.28)}
.bsave:active{transform:scale(.97)}
.bcanc{width:100%;padding:12px;background:transparent;color:var(--dim);border:1px solid var(--bdr);border-radius:12px;font-family:var(--fd);font-size:14px;font-weight:700;cursor:pointer;margin-top:9px;transition:all .2s}
.bcanc:hover{border-color:var(--red);color:var(--red)}
.lscroll{overflow-y:auto;flex:1}
.lscroll::-webkit-scrollbar{width:3px}
.lscroll::-webkit-scrollbar-thumb{background:var(--bdr);border-radius:2px}
.pi{display:flex;align-items:center;gap:9px;padding:12px 0;border-bottom:1px solid var(--bdr)}
.pi:last-child{border-bottom:none}
.pi-info{flex:1;min-width:0}
.pi-lbl{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--dim)}
.pi-code{font-family:var(--fm);font-size:12px;color:var(--dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pi-price{font-family:var(--fm);font-size:17px;font-weight:700;color:#00ff88;white-space:nowrap}
.bdel{background:transparent;border:1px solid var(--bdr);color:var(--dim);border-radius:7px;padding:5px 8px;cursor:pointer;font-size:12px;transition:all .2s;flex-shrink:0}
.bdel:hover{border-color:var(--red);color:var(--red)}
.empty{text-align:center;padding:32px 0;color:var(--dim);font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase}

/* ── TOAST ── */
#toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%) translateY(14px);background:var(--sur2);border:1px solid var(--bdr);color:var(--txt);border-radius:10px;padding:10px 16px;font-size:13px;font-weight:700;z-index:999;opacity:0;transition:all .3s;white-space:nowrap;pointer-events:none}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#toast.ok{border-color:#00ff88;color:#00ff88}
#toast.err{border-color:var(--red);color:var(--red)}

@media(min-width:480px){
  #app{border-left:1px solid var(--bdr);border-right:1px solid var(--bdr)}
  .sheet{border-radius:22px !important;margin-bottom:36px}
  .modal{align-items:center}
}
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="logo">Scan<b>Price</b></div>
    <button class="btn-hdr" onclick="openList()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><circle cx="3" cy="6" r="1.5" fill="currentColor"/><circle cx="3" cy="12" r="1.5" fill="currentColor"/><circle cx="3" cy="18" r="1.5" fill="currentColor"/></svg>
      Productos
    </button>
  </header>

  <main>
    <div id="sw">
      <video id="vid" autoplay playsinline muted></video>
      <div class="sf">
        <div class="sf-box">
          <div class="c tl"></div><div class="c tr"></div>
          <div class="c bl"></div><div class="c br"></div>
          <div class="sl" id="sl"></div>
        </div>
      </div>
      <div class="idle" id="idle">
        <svg width="42" height="42" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
          <rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="4" height="4" rx=".5"/>
        </svg>
        <p>Presiona Escanear</p>
      </div>
      <div id="dbg"></div>
    </div>

    <div id="rc">
      <div class="rlbl">Resultado</div>
      <div class="rph" id="rph">Esperando escaneo...</div>
      <div id="rbody" style="display:none">
        <div class="rcode" id="rcode"></div>
        <div class="rprice" id="rprice" style="display:none"></div>
        <div class="rmiss" id="rmiss" style="display:none">Producto no registrado</div>
      </div>
    </div>

    <div id="mr">
      <input id="mc" type="text" inputmode="numeric" placeholder="Código manual...">
      <button id="bm" onclick="manualLookup()">Buscar</button>
    </div>

    <button id="bs" onclick="toggleScan()">
      <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M2 8V5a2 2 0 0 1 2-2h3M2 16v3a2 2 0 0 0 2 2h3M22 8V5a2 2 0 0 0-2-2h-3M22 16v3a2 2 0 0 1-2 2h-3"/>
        <line x1="7" y1="12" x2="17" y2="12"/>
      </svg>
      <span id="btxt">Escanear</span>
    </button>
  </main>
</div>

<!-- ADD MODAL -->
<div class="modal" id="am" onclick="if(event.target===this)closeAdd()">
  <div class="sheet">
    <div class="hdl"></div>
    <div class="stitle">Nuevo <span>Producto</span></div>
    <div class="fg"><label class="flbl">Código</label><input class="fin" id="fc" readonly></div>
    <div class="fg"><label class="flbl">Precio ($)</label><input class="fin" id="fp" type="number" step="0.01" min="0" placeholder="0.00" inputmode="decimal"></div>
    <button class="bsave" onclick="saveProd()">Guardar</button>
    <button class="bcanc" onclick="closeAdd()">Cancelar</button>
  </div>
</div>

<!-- LIST MODAL -->
<div class="modal" id="lm" onclick="if(event.target===this)closeList()">
  <div class="sheet sc">
    <div class="hdl"></div>
    <div class="stitle">Mis <span>Productos</span></div>
    <div class="lscroll" id="lb"></div>
    <button class="bcanc" style="margin-top:12px;flex-shrink:0" onclick="closeList()">Cerrar</button>
  </div>
</div>

<div id="toast"></div>

<!-- Quagga2 — much better detection than Quagga1 -->
<script src="https://cdn.jsdelivr.net/npm/@ericblade/quagga2@1.8.4/dist/quagga.min.js"></script>
<script>
// ── DB ──
const DB={
  get:()=>{try{return JSON.parse(localStorage.getItem('sp3')||'{}')}catch{return{}}},
  set:d=>localStorage.setItem('sp3',JSON.stringify(d))
};

// ── AUDIO ──
let actx;
function beep(ok){
  try{
    actx=actx||new(window.AudioContext||window.webkitAudioContext)();
    const o=actx.createOscillator(),g=actx.createGain();
    o.connect(g);g.connect(actx.destination);
    if(ok){o.frequency.setValueAtTime(880,actx.currentTime);o.frequency.setValueAtTime(1200,actx.currentTime+.07)}
    else o.frequency.value=380;
    g.gain.setValueAtTime(.25,actx.currentTime);
    g.gain.exponentialRampToValueAtTime(.001,actx.currentTime+.22);
    o.start();o.stop(actx.currentTime+.25);
  }catch(_){}
}
const vibe=p=>{try{navigator.vibrate&&navigator.vibrate(p)}catch(_){}};

// ── TOAST ──
let tT;
function toast(msg,type){
  const el=document.getElementById('toast');
  clearTimeout(tT);
  el.textContent=msg;el.className='show '+(type||'');
  tT=setTimeout(()=>el.className='',2800);
}

// ── STATE ──
let scanning=false,stream=null,lockCode=null,lockTimer=null;
let quaggaRunning=false;
const USE_NATIVE='BarcodeDetector' in window;
let detector=null;
let rafId=null;

// debug helper
function dbg(msg){
  const el=document.getElementById('dbg');
  el.style.display='block';
  el.textContent=msg;
}

// ── INIT NATIVE DETECTOR ──
async function initDetector(){
  if(!USE_NATIVE)return false;
  try{
    const fmts=await BarcodeDetector.getSupportedFormats();
    // request as many barcode types as supported
    const want=['ean_13','ean_8','code_128','code_39','upc_a','upc_e','itf','codabar','qr_code','data_matrix'];
    const use=want.filter(f=>fmts.includes(f));
    detector=new BarcodeDetector({formats:use.length?use:fmts});
    return true;
  }catch(e){return false;}
}

// ── TOGGLE ──
async function toggleScan(){scanning?stopScan():await startScan();}

async function startScan(){
  try{
    stream=await navigator.mediaDevices.getUserMedia({
      video:{facingMode:{ideal:'environment'},width:{ideal:1920},height:{ideal:1080}},
      audio:false
    });
  }catch(e){
    const msgs={NotAllowedError:'Permiso denegado',NotFoundError:'Sin cámara',NotReadableError:'Cámara ocupada'};
    toast(msgs[e.name]||'Error de cámara: '+e.name,'err');
    return;
  }

  const vid=document.getElementById('vid');
  vid.srcObject=stream;
  try{await vid.play()}catch(_){}

  scanning=true;
  document.getElementById('idle').style.display='none';
  document.getElementById('sl').style.display='block';
  document.getElementById('sw').classList.add('on');
  document.getElementById('bs').classList.add('on');
  document.getElementById('btxt').textContent='Detener';
  dbg('Iniciando...');

  // prefer native BarcodeDetector, fall back to Quagga2
  if(USE_NATIVE){
    if(!detector)await initDetector();
    if(detector){nativeLoop();return;}
  }
  startQuagga2();
}

// ── NATIVE LOOP ──
async function nativeLoop(){
  dbg('Modo: BarcodeDetector nativo');
  const vid=document.getElementById('vid');
  let frameCount=0;
  async function tick(){
    if(!scanning)return;
    frameCount++;
    if(vid.readyState>=2&&!vid.paused){
      try{
        const res=await detector.detect(vid);
        if(res&&res.length){
          dbg('✓ Detectado: '+res[0].rawValue);
          onCode(res[0].rawValue);
          return;
        }
        if(frameCount%30===0)dbg('Buscando... frame '+frameCount);
      }catch(e){
        // BarcodeDetector failed, fall back to Quagga2
        dbg('Nativo falló, cambiando a Quagga2');
        detector=null;
        startQuagga2();
        return;
      }
    }
    rafId=requestAnimationFrame(tick);
  }
  rafId=requestAnimationFrame(tick);
}

// ── QUAGGA2 ──
function startQuagga2(){
  if(quaggaRunning)return;
  dbg('Modo: Quagga2');
  const vid=document.getElementById('vid');

  // wait for video to have real dimensions
  function tryInit(){
    if(vid.videoWidth===0||vid.videoHeight===0){
      setTimeout(tryInit,200);return;
    }

    // Use Quagga2 with LiveStream on the existing video element
    Quagga.init({
      inputStream:{
        type:'LiveStream',
        target:vid,
        constraints:{
          facingMode:'environment',
          width:{ideal:1280},
          height:{ideal:720}
        }
      },
      locator:{patchSize:'medium',halfSample:false},
      numOfWorkers:0, // 0 = main thread, more reliable on mobile
      frequency:15,
      decoder:{
        readers:[
          'ean_reader',
          'ean_8_reader',
          'code_128_reader',
          'code_39_reader',
          'upc_reader',
          'upc_e_reader',
          'codabar_reader',
          'i2of5_reader'
        ],
        multiple:false
      },
      locate:true
    }, err=>{
      if(err){
        dbg('Quagga init error: '+err);
        // last resort: canvas polling
        canvasPolling();
        return;
      }
      quaggaRunning=true;
      Quagga.start();
      dbg('Quagga2 activo');

      let frameN=0;
      Quagga.onProcessed(result=>{
        frameN++;
        if(frameN%20===0)dbg('Quagga buscando... f'+frameN);
      });

      Quagga.onDetected(result=>{
        const code=result&&result.codeResult&&result.codeResult.code;
        if(!code)return;
        // confidence filter
        const errs=(result.codeResult.decodedCodes||[])
          .filter(x=>x.error!==undefined).map(x=>x.error);
        const avg=errs.length?errs.reduce((a,b)=>a+b,0)/errs.length:1;
        if(avg>0.35){dbg('baja confianza: '+avg.toFixed(2));return;}
        dbg('✓ Quagga: '+code+' (err:'+avg.toFixed(2)+')');
        onCode(code);
      });
    });
  }
  tryInit();
}

// ── CANVAS POLLING (ultimate fallback) ──
// Uses BarcodeDetector on canvas frames — helps when video element detection fails
function canvasPolling(){
  dbg('Modo: Canvas polling');
  const vid=document.getElementById('vid');
  const canvas=document.createElement('canvas');
  canvas.style.display='none';
  document.body.appendChild(canvas);

  async function grab(){
    if(!scanning){canvas.remove();return;}
    if(vid.readyState<2){rafId=setTimeout(grab,300);return;}
    canvas.width=vid.videoWidth;
    canvas.height=vid.videoHeight;
    canvas.getContext('2d').drawImage(vid,0,0);

    if(detector){
      try{
        const res=await detector.detect(canvas);
        if(res&&res.length){canvas.remove();onCode(res[0].rawValue);return;}
      }catch(_){}
    }

    // Quagga2 decodeSingle on canvas
    const src=canvas.toDataURL('image/jpeg',.85);
    Quagga.decodeSingle({
      src,
      numOfWorkers:0,
      inputStream:{size:Math.min(vid.videoWidth,1280)},
      decoder:{readers:['ean_reader','ean_8_reader','code_128_reader','code_39_reader','upc_reader','upc_e_reader']}
    },result=>{
      if(!scanning){canvas.remove();return;}
      if(result&&result.codeResult&&result.codeResult.code){
        canvas.remove();
        onCode(result.codeResult.code);
      }else{
        rafId=setTimeout(grab,250);
      }
    });
  }
  setTimeout(grab,500);
}

// ── STOP ──
function stopScan(){
  scanning=false;
  cancelAnimationFrame(rafId);clearTimeout(rafId);rafId=null;

  if(quaggaRunning){
    try{Quagga.stop();Quagga.offDetected();Quagga.offProcessed();}catch(_){}
    quaggaRunning=false;
  }

  if(stream){stream.getTracks().forEach(t=>t.stop());stream=null;}
  const vid=document.getElementById('vid');
  vid.srcObject=null;

  document.getElementById('idle').style.display='flex';
  document.getElementById('sl').style.display='none';
  document.getElementById('sw').classList.remove('on');
  document.getElementById('bs').classList.remove('on');
  document.getElementById('btxt').textContent='Escanear';
  document.getElementById('dbg').style.display='none';
}

// ── ON CODE ──
function onCode(code){
  if(!code||!scanning)return;
  if(lockCode===code)return;
  clearTimeout(lockTimer);
  lockCode=code;
  lockTimer=setTimeout(()=>lockCode=null,3000);
  stopScan();
  processCode(code);
}

// ── PROCESS ──
function processCode(code){
  const prods=DB.get();
  const sw=document.getElementById('sw');
  const rc=document.getElementById('rc');
  document.getElementById('rph').style.display='none';
  document.getElementById('rbody').style.display='block';
  document.getElementById('rcode').textContent=code;
  sw.classList.remove('hit','mis');

  if(prods[code]!==undefined){
    document.getElementById('rprice').textContent='$'+parseFloat(prods[code]).toFixed(2);
    document.getElementById('rprice').style.display='block';
    document.getElementById('rmiss').style.display='none';
    rc.className='hit';sw.classList.add('hit');
    beep(true);vibe([60,30,60]);
    toast('✓ Precio encontrado','ok');
  }else{
    document.getElementById('rprice').style.display='none';
    document.getElementById('rmiss').style.display='block';
    rc.className='mis';sw.classList.add('mis');
    beep(false);vibe([100]);
    toast('Producto no registrado','err');
    openAdd(code);
  }
}

// ── MANUAL ──
function manualLookup(){
  const code=document.getElementById('mc').value.trim();
  if(!code){toast('Ingresa un código','err');return;}
  document.getElementById('mc').value='';
  processCode(code);
}
document.getElementById('mc').addEventListener('keydown',e=>{if(e.key==='Enter')manualLookup()});

// ── ADD MODAL ──
function openAdd(code){
  document.getElementById('fc').value=code;
  document.getElementById('fp').value='';
  document.getElementById('am').classList.add('show');
  setTimeout(()=>document.getElementById('fp').focus(),350);
}
function closeAdd(){document.getElementById('am').classList.remove('show')}
function saveProd(){
  const code=document.getElementById('fc').value.trim();
  const price=parseFloat(document.getElementById('fp').value);
  if(!code){toast('Código vacío','err');return;}
  if(isNaN(price)||price<0){toast('Precio inválido','err');return;}
  const p=DB.get();p[code]=price;DB.set(p);
  closeAdd();
  document.getElementById('rprice').textContent='$'+price.toFixed(2);
  document.getElementById('rprice').style.display='block';
  document.getElementById('rmiss').style.display='none';
  document.getElementById('rc').className='hit';
  beep(true);vibe([40,20,40]);
  toast('✓ Guardado','ok');
}
document.getElementById('fp').addEventListener('keydown',e=>{if(e.key==='Enter')saveProd()});

// ── LIST ──
function openList(){renderList();document.getElementById('lm').classList.add('show')}
function closeList(){document.getElementById('lm').classList.remove('show')}
function renderList(){
  const p=DB.get(),keys=Object.keys(p);
  const el=document.getElementById('lb');
  if(!keys.length){el.innerHTML='<div class="empty">Sin productos aún</div>';return;}
  el.innerHTML=keys.map(c=>`
    <div class="pi">
      <div class="pi-info">
        <div class="pi-lbl">Código</div>
        <div class="pi-code">${c}</div>
      </div>
      <div class="pi-price">$${parseFloat(p[c]).toFixed(2)}</div>
      <button class="bdel" onclick="delProd('${c.replace(/'/g,"\\'")}')">✕</button>
    </div>`).join('');
}
function delProd(code){
  const p=DB.get();delete p[code];DB.set(p);
  renderList();vibe([40]);toast('Eliminado','err');
}

// close modals on backdrop
document.getElementById('am').addEventListener('click',e=>{if(e.target===document.getElementById('am'))closeAdd()});
document.getElementById('lm').addEventListener('click',e=>{if(e.target===document.getElementById('lm'))closeList()});

// init detector on load
if(USE_NATIVE)initDetector();
</script>
</body>
</html>
