<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a0a0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>ScanPrice</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --surface2: #1c1c26;
    --accent: #00e5ff;
    --accent2: #ff3d71;
    --accent3: #a259ff;
    --accent4: #00ff88;
    --accent5: #ffb300;
    --text: #f0f0ff;
    --text-dim: #6b6b8a;
    --border: rgba(255,255,255,0.07);
    --glow: 0 0 30px rgba(0,229,255,0.25);
    --radius: 20px;
    --font-display: 'Syne', sans-serif;
    --font-mono: 'Space Mono', monospace;
  }

  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font-display); overflow: hidden; }

  #app {
    display: flex; flex-direction: column;
    height: 100dvh; max-width: 480px;
    margin: 0 auto; position: relative; overflow: hidden;
  }

  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 20px 10px; flex-shrink: 0; z-index: 10;
  }
  .logo { font-size: 20px; font-weight: 800; letter-spacing: -0.5px; }
  .logo span { color: var(--accent); }

  .header-actions { display: flex; gap: 8px; align-items: center; }
  .btn-header {
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text-dim); border-radius: 10px;
    padding: 7px 12px; font-family: var(--font-display);
    font-size: 12px; font-weight: 700; cursor: pointer;
    display: flex; align-items: center; gap: 5px; transition: all .2s;
  }
  .btn-header:hover { color: var(--accent); border-color: var(--accent); }

  .mode-tabs { display: flex; gap: 8px; padding: 0 20px 12px; flex-shrink: 0; }
  .mode-tab {
    flex: 1; padding: 10px; border-radius: 12px;
    border: 1px solid var(--border); background: var(--surface2);
    color: var(--text-dim); font-family: var(--font-display);
    font-size: 13px; font-weight: 700; cursor: pointer;
    transition: all .2s; text-align: center;
  }
  .mode-tab.active { border-color: var(--accent); color: var(--accent); background: rgba(0,229,255,0.08); }
  .mode-tab.sale-tab.active { border-color: var(--accent5); color: var(--accent5); background: rgba(255,179,0,0.08); }

  main { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 0 20px 16px; gap: 14px; overflow: hidden; }

  #scanner-wrap {
    width: 100%; flex: 1; max-height: 280px;
    position: relative; border-radius: var(--radius);
    overflow: hidden; background: #000;
    border: 1px solid var(--border); transition: border-color .3s, box-shadow .3s;
  }
  #scanner-wrap.active     { border-color: var(--accent); box-shadow: var(--glow); }
  #scanner-wrap.found      { border-color: var(--accent4); box-shadow: 0 0 30px rgba(0,255,136,0.3); }
  #scanner-wrap.new-product{ border-color: var(--accent3); box-shadow: 0 0 30px rgba(162,89,255,0.3); }
  #scanner-wrap.sale-mode  { border-color: var(--accent5); box-shadow: 0 0 30px rgba(255,179,0,0.25); }

  #scanner-video { width: 100%; height: 100%; object-fit: cover; display: none; }

  .scanner-overlay { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; pointer-events: none; }
  .scan-frame { width: 220px; height: 120px; position: relative; }
  .scan-frame::before, .scan-frame::after,
  .scan-frame > span::before, .scan-frame > span::after {
    content: ''; position: absolute; width: 22px; height: 22px;
    border-color: var(--accent); border-style: solid;
  }
  .scan-frame::before  { top:0; left:0;  border-width: 3px 0 0 3px; }
  .scan-frame::after   { top:0; right:0; border-width: 3px 3px 0 0; }
  .scan-frame > span::before { bottom:0; left:0;  border-width: 0 0 3px 3px; }
  .scan-frame > span::after  { bottom:0; right:0; border-width: 0 3px 3px 0; }
  .scan-line {
    position: absolute; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    animation: scanMove 2s ease-in-out infinite;
    box-shadow: 0 0 8px var(--accent);
  }
  @keyframes scanMove { 0%,100% { top: 8px; opacity:.4; } 50% { top: calc(100% - 8px); opacity:1; } }

  .scanner-idle-msg {
    position: absolute; inset: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 10px; color: var(--text-dim); background: var(--surface);
  }
  .scanner-idle-msg svg { opacity: 0.3; }
  .scanner-idle-msg p { font-size: 13px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; }

  #btn-scan {
    width: 100%; padding: 16px; border-radius: 14px; border: none;
    background: var(--accent); color: #000;
    font-family: var(--font-display); font-size: 15px; font-weight: 800;
    cursor: pointer; transition: all .2s;
    display: flex; align-items: center; justify-content: center; gap: 10px;
    flex-shrink: 0; box-shadow: 0 4px 20px rgba(0,229,255,0.3);
  }
  #btn-scan:active { transform: scale(0.97); }
  #btn-scan.scanning { background: var(--accent2); box-shadow: 0 4px 20px rgba(255,61,113,0.3); }
  #btn-scan.sale-btn { background: var(--accent5); box-shadow: 0 4px 20px rgba(255,179,0,0.3); }
  #btn-scan.sale-btn.scanning { background: var(--accent2); }

  #result-card {
    width: 100%; border-radius: var(--radius);
    background: var(--surface); border: 1px solid var(--border);
    padding: 16px 20px; flex-shrink: 0; transition: all .3s;
    min-height: 80px; display: flex; flex-direction: column; justify-content: center;
  }
  #result-card.found { border-color: var(--accent4); background: rgba(0,255,136,0.05); }
  #result-card.miss  { border-color: var(--accent2); background: rgba(255,61,113,0.05); }

  .result-label { font-size: 10px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--text-dim); margin-bottom: 4px; }
  .result-code { font-family: var(--font-mono); font-size: 12px; color: var(--text-dim); margin-bottom: 2px; }
  .result-name { font-size: 14px; font-weight: 700; color: var(--text); margin-bottom: 2px; }
  .result-price { font-size: 42px; font-weight: 800; line-height: 1; color: var(--accent4); letter-spacing: -2px; }
  .result-notfound { font-size: 16px; font-weight: 700; color: var(--accent2); }
  .result-placeholder { font-size: 14px; color: var(--text-dim); font-weight: 400; }

  #sale-panel {
    width: 100%; border-radius: var(--radius);
    background: var(--surface); border: 1px solid var(--border);
    padding: 14px 18px; flex-shrink: 0;
    display: none; flex-direction: column; gap: 10px;
  }
  #sale-panel.visible { display: flex; }

  .sale-header { display: flex; justify-content: space-between; align-items: center; }
  .sale-title { font-size: 12px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--accent5); }
  .sale-count { font-size: 12px; color: var(--text-dim); font-family: var(--font-mono); }

  .sale-items { max-height: 120px; overflow-y: auto; display: flex; flex-direction: column; gap: 6px; }
  .sale-items::-webkit-scrollbar { width: 3px; }
  .sale-items::-webkit-scrollbar-thumb { background: var(--border); }

  .sale-item { display: flex; align-items: center; justify-content: space-between; padding: 6px 10px; background: var(--surface2); border-radius: 10px; gap: 8px; }
  .sale-item-info { flex: 1; min-width: 0; }
  .sale-item-name { font-size: 12px; font-weight: 700; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .sale-item-code { font-size: 10px; color: var(--text-dim); font-family: var(--font-mono); }
  .sale-item-qty { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; display: flex; align-items: center; gap: 6px; padding: 2px 4px; }
  .qty-btn { background: none; border: none; color: var(--text-dim); font-size: 16px; cursor: pointer; padding: 0 4px; line-height: 1; transition: color .2s; }
  .qty-btn:hover { color: var(--accent5); }
  .qty-num { font-family: var(--font-mono); font-size: 13px; font-weight: 700; color: var(--text); min-width: 20px; text-align: center; }
  .sale-item-price { font-family: var(--font-mono); font-size: 13px; font-weight: 700; color: var(--accent4); white-space: nowrap; }
  .sale-item-del { background: none; border: none; color: var(--text-dim); font-size: 14px; cursor: pointer; padding: 2px 4px; transition: color .2s; }
  .sale-item-del:hover { color: var(--accent2); }

  .sale-total-row { display: flex; justify-content: space-between; align-items: center; padding-top: 8px; border-top: 1px solid var(--border); }
  .sale-total-label { font-size: 12px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--text-dim); }
  .sale-total-amount { font-size: 28px; font-weight: 800; color: var(--accent5); letter-spacing: -1px; }

  .sale-actions { display: flex; gap: 8px; }
  .btn-finish-sale { flex: 1; padding: 12px; border-radius: 12px; border: none; background: var(--accent5); color: #000; font-family: var(--font-display); font-size: 14px; font-weight: 800; cursor: pointer; transition: all .2s; }
  .btn-finish-sale:active { transform: scale(0.97); }
  .btn-cancel-sale { padding: 12px 16px; border-radius: 12px; border: 1px solid var(--border); background: transparent; color: var(--text-dim); font-family: var(--font-display); font-size: 14px; font-weight: 700; cursor: pointer; transition: all .2s; }
  .btn-cancel-sale:hover { border-color: var(--accent2); color: var(--accent2); }

  .modal-backdrop {
    position: fixed; inset: 0; z-index: 100;
    background: rgba(0,0,0,0.75); backdrop-filter: blur(6px);
    display: flex; align-items: flex-end; justify-content: center;
    opacity: 0; pointer-events: none; transition: opacity .25s;
  }
  .modal-backdrop.show { opacity: 1; pointer-events: all; }
  .modal-sheet { width: 100%; max-width: 480px; background: var(--surface); border-radius: 24px 24px 0 0; padding: 12px 24px 36px; transform: translateY(100%); transition: transform .3s cubic-bezier(.32,1,.23,1); border-top: 1px solid var(--border); }
  .modal-backdrop.show .modal-sheet { transform: translateY(0); }
  .sheet-handle { width: 40px; height: 4px; border-radius: 2px; background: var(--border); margin: 0 auto 18px; }
  .sheet-title { font-size: 20px; font-weight: 800; margin-bottom: 18px; }
  .sheet-title span { color: var(--accent); }

  .form-group { margin-bottom: 14px; }
  .form-label { font-size: 10px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--text-dim); display: block; margin-bottom: 6px; }
  .form-input { width: 100%; padding: 13px 15px; background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; color: var(--text); font-family: var(--font-mono); font-size: 16px; outline: none; transition: border-color .2s; }
  .form-input:focus { border-color: var(--accent); }
  .form-input[readonly] { color: var(--text-dim); }

  .btn-save { width: 100%; padding: 15px; background: var(--accent3); color: #fff; border: none; border-radius: 13px; font-family: var(--font-display); font-size: 15px; font-weight: 800; cursor: pointer; transition: all .2s; margin-top: 4px; box-shadow: 0 4px 20px rgba(162,89,255,0.3); }
  .btn-save:active { transform: scale(0.97); }
  .btn-cancel { width: 100%; padding: 13px; background: transparent; color: var(--text-dim); border: 1px solid var(--border); border-radius: 13px; font-family: var(--font-display); font-size: 14px; font-weight: 700; cursor: pointer; margin-top: 10px; transition: all .2s; }
  .btn-cancel:hover { border-color: var(--accent2); color: var(--accent2); }

  #list-modal .modal-sheet { max-height: 85vh; display: flex; flex-direction: column; }
  .list-scroll { overflow-y: auto; flex: 1; padding-right: 4px; }
  .list-scroll::-webkit-scrollbar { width: 4px; }
  .list-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .list-toolbar { display: flex; gap: 8px; margin-bottom: 14px; }
  .btn-toolbar { flex: 1; padding: 10px 8px; border-radius: 10px; border: 1px solid var(--border); background: var(--surface2); color: var(--text-dim); font-family: var(--font-display); font-size: 12px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 5px; transition: all .2s; }
  .btn-toolbar.export { border-color: rgba(0,255,136,0.3); color: var(--accent4); }
  .btn-toolbar.export:hover { border-color: var(--accent4); background: rgba(0,255,136,0.05); }
  .btn-toolbar.import { border-color: rgba(0,229,255,0.3); color: var(--accent); }
  .btn-toolbar.import:hover { border-color: var(--accent); background: rgba(0,229,255,0.05); }
  #import-file { display: none; }

  .product-item { display: flex; align-items: center; padding: 12px 0; border-bottom: 1px solid var(--border); gap: 10px; }
  .product-item:last-child { border-bottom: none; }
  .product-info { flex: 1; min-width: 0; }
  .product-name-display { font-size: 14px; font-weight: 700; color: var(--text); margin-bottom: 2px; }
  .product-code { font-family: var(--font-mono); font-size: 11px; color: var(--text-dim); }
  .product-price-badge { font-family: var(--font-mono); font-size: 16px; font-weight: 700; color: var(--accent4); white-space: nowrap; }
  .btn-edit { background: transparent; border: 1px solid var(--border); color: var(--text-dim); border-radius: 8px; padding: 6px 10px; cursor: pointer; font-size: 13px; transition: all .2s; flex-shrink: 0; }
  .btn-edit:hover { border-color: var(--accent3); color: var(--accent3); }
  .btn-delete { background: transparent; border: 1px solid var(--border); color: var(--text-dim); border-radius: 8px; padding: 6px 10px; cursor: pointer; font-size: 13px; transition: all .2s; flex-shrink: 0; }
  .btn-delete:hover { border-color: var(--accent2); color: var(--accent2); }
  .empty-state { text-align: center; padding: 36px 0; color: var(--text-dim); font-size: 13px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; }

  #sale-summary-modal .modal-sheet { max-height: 85vh; display: flex; flex-direction: column; }
  .summary-items { overflow-y: auto; flex: 1; }
  .summary-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--border); }
  .summary-item:last-child { border-bottom: none; }
  .summary-item-left { flex: 1; }
  .summary-item-name { font-size: 14px; font-weight: 700; color: var(--text); }
  .summary-item-detail { font-size: 11px; color: var(--text-dim); font-family: var(--font-mono); margin-top: 2px; }
  .summary-item-price { font-family: var(--font-mono); font-size: 16px; font-weight: 700; color: var(--accent4); }
  .summary-grand-total { border-top: 2px solid var(--border); margin-top: 10px; padding-top: 14px; display: flex; justify-content: space-between; align-items: center; }
  .summary-grand-label { font-size: 14px; font-weight: 700; color: var(--text-dim); letter-spacing: 1px; text-transform: uppercase; }
  .summary-grand-amount { font-size: 36px; font-weight: 800; color: var(--accent5); letter-spacing: -1px; }

  #toast {
    position: fixed; bottom: 110px; left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); border-radius: 12px;
    padding: 11px 18px; font-size: 13px; font-weight: 700;
    z-index: 999; opacity: 0; transition: all .3s;
    white-space: nowrap; pointer-events: none;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  #toast.success { border-color: var(--accent4); color: var(--accent4); }
  #toast.error   { border-color: var(--accent2); color: var(--accent2); }
  #toast.sale    { border-color: var(--accent5); color: var(--accent5); }

  @media (min-width: 480px) {
    #app { border-left: 1px solid var(--border); border-right: 1px solid var(--border); }
    .modal-sheet { border-radius: 24px !important; margin-bottom: 40px; }
    .modal-backdrop { align-items: center; }
  }
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="logo">Scan<span>Price</span></div>
    <div class="header-actions">
      <button class="btn-header" onclick="openList()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><circle cx="3" cy="6" r="1.5" fill="currentColor"/><circle cx="3" cy="12" r="1.5" fill="currentColor"/><circle cx="3" cy="18" r="1.5" fill="currentColor"/></svg>
        Productos
      </button>
    </div>
  </header>

  <div class="mode-tabs">
    <button class="mode-tab active" id="tab-scan" onclick="setMode('scan')">🔍 Escanear</button>
    <button class="mode-tab sale-tab" id="tab-sale" onclick="setMode('sale')">🛒 Venta</button>
  </div>

  <main>
    <div id="scanner-wrap">
      <video id="scanner-video" autoplay playsinline muted style="display:none"></video>
      <div class="scanner-overlay">
        <div class="scan-frame">
          <span></span>
          <div class="scan-line" id="scan-line" style="display:none"></div>
        </div>
      </div>
      <div class="scanner-idle-msg" id="idle-msg">
        <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
          <rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="4" height="4"/>
        </svg>
        <p id="idle-text">Presiona Escanear</p>
      </div>
    </div>

    <div id="result-card">
      <div class="result-label">Resultado</div>
      <div class="result-placeholder" id="result-placeholder">Esperando escaneo...</div>
      <div id="result-content" style="display:none">
        <div class="result-code" id="result-code"></div>
        <div class="result-name" id="result-name" style="display:none"></div>
        <div class="result-price" id="result-price"></div>
        <div class="result-notfound" id="result-notfound" style="display:none">Producto no registrado</div>
      </div>
    </div>

    <div id="sale-panel">
      <div class="sale-header">
        <span class="sale-title">🛒 Venta activa</span>
        <span class="sale-count" id="sale-count">0 productos</span>
      </div>
      <div class="sale-items" id="sale-items-list">
        <div class="empty-state" style="padding:16px 0;font-size:11px">Escanea productos para agregar</div>
      </div>
      <div class="sale-total-row">
        <span class="sale-total-label">Total</span>
        <span class="sale-total-amount" id="sale-total">$0.00</span>
      </div>
      <div class="sale-actions">
        <button class="btn-cancel-sale" onclick="cancelSale()">Cancelar</button>
        <button class="btn-finish-sale" onclick="finishSale()">Cobrar</button>
      </div>
    </div>

    <button id="btn-scan" onclick="toggleScan()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M2 8V5a2 2 0 0 1 2-2h3M2 16v3a2 2 0 0 0 2 2h3M22 8V5a2 2 0 0 0-2-2h-3M22 16v3a2 2 0 0 1-2 2h-3"/>
        <line x1="7" y1="12" x2="17" y2="12" stroke-width="2.5"/>
      </svg>
      <span id="btn-scan-text">Escanear</span>
    </button>
  </main>
</div>

<!-- ADD PRODUCT MODAL -->
<div class="modal-backdrop" id="add-modal">
  <div class="modal-sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">Nuevo <span>Producto</span></div>
    <div class="form-group">
      <label class="form-label">Código de barras</label>
      <input class="form-input" id="form-code" readonly>
    </div>
    <div class="form-group">
      <label class="form-label">Nombre del producto</label>
      <input class="form-input" id="form-name" type="text" placeholder="Ej: Coca-Cola 600ml">
    </div>
    <div class="form-group">
      <label class="form-label">Precio ($)</label>
      <input class="form-input" id="form-price" type="number" step="0.01" min="0" placeholder="0.00" inputmode="decimal">
    </div>
    <button class="btn-save" onclick="saveProduct()">Guardar Producto</button>
    <button class="btn-cancel" onclick="closeAddModal()">Cancelar</button>
  </div>
</div>

<!-- EDIT PRODUCT MODAL -->
<div class="modal-backdrop" id="edit-modal">
  <div class="modal-sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">Editar <span>Producto</span></div>
    <div class="form-group">
      <label class="form-label">Código de barras</label>
      <input class="form-input" id="edit-code" readonly>
    </div>
    <div class="form-group">
      <label class="form-label">Nombre del producto</label>
      <input class="form-input" id="edit-name" type="text">
    </div>
    <div class="form-group">
      <label class="form-label">Precio ($)</label>
      <input class="form-input" id="edit-price" type="number" step="0.01" min="0" inputmode="decimal">
    </div>
    <button class="btn-save" style="background:var(--accent)" onclick="saveEdit()">Guardar Cambios</button>
    <button class="btn-cancel" onclick="closeEditModal()">Cancelar</button>
  </div>
</div>

<!-- LIST MODAL -->
<div class="modal-backdrop" id="list-modal">
  <div class="modal-sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">Mis <span>Productos</span></div>
    <div class="list-toolbar">
      <button class="btn-toolbar export" onclick="exportExcel()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Exportar Excel
      </button>
      <label class="btn-toolbar import">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        Cargar Excel
        <input type="file" id="import-file" accept=".xlsx,.xls,.csv" onchange="importExcel(event)">
      </label>
    </div>
    <div class="list-scroll" id="product-list-container"></div>
    <button class="btn-cancel" onclick="closeList()" style="margin-top:14px">Cerrar</button>
  </div>
</div>

<!-- SALE SUMMARY MODAL -->
<div class="modal-backdrop" id="sale-summary-modal">
  <div class="modal-sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">✅ Resumen de <span>Venta</span></div>
    <div class="summary-items" id="summary-items-container"></div>
    <button class="btn-save" style="background:var(--accent5);margin-top:14px" onclick="exportSaleExcel()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="display:inline;vertical-align:middle;margin-right:6px"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Exportar Venta Excel
    </button>
    <button class="btn-cancel" onclick="closeSaleSummary()">Cerrar</button>
  </div>
</div>

<div id="toast"></div>

<script>
// ────────────────────────────────────────────────
// STATE
// ────────────────────────────────────────────────
let isScanning = false;
let scanLock   = false;
let recentCodes = {};   // code → timestamp, debounce
let audioCtx   = null;
let currentMode = 'scan';
let saleItems  = {};

// Camera / detection
let mediaStream   = null;
let scanInterval  = null;
let detector      = null;  // native BarcodeDetector instance
let zxingDecoder  = null;  // ZXing BrowserMultiFormatReader
let offCanvas     = null;
let offCtx        = null;

const HAS_NATIVE = (typeof BarcodeDetector !== 'undefined');

// ────────────────────────────────────────────────
// STORAGE
// ────────────────────────────────────────────────
function getProducts() {
  try { return JSON.parse(localStorage.getItem('scanprice_products') || '{}'); }
  catch { return {}; }
}
function saveProducts(p) { localStorage.setItem('scanprice_products', JSON.stringify(p)); }

function getProductData(code) {
  const v = getProducts()[code];
  if (v == null) return null;
  if (typeof v === 'number' || typeof v === 'string') return { price: parseFloat(v), name: '' };
  return { price: parseFloat(v.price || 0), name: v.name || '' };
}
function setProductData(code, data) {
  const p = getProducts();
  p[code] = data;
  saveProducts(p);
}

// ────────────────────────────────────────────────
// MODE
// ────────────────────────────────────────────────
function setMode(mode) {
  currentMode = mode;
  document.getElementById('tab-scan').classList.toggle('active', mode === 'scan');
  document.getElementById('tab-sale').classList.toggle('active', mode === 'sale');
  const btn = document.getElementById('btn-scan');
  if (mode === 'sale') {
    document.getElementById('result-card').style.display = 'none';
    document.getElementById('sale-panel').classList.add('visible');
    btn.classList.add('sale-btn');
    document.getElementById('idle-text').textContent = 'Escanea un producto';
    renderSalePanel();
  } else {
    document.getElementById('result-card').style.display = 'flex';
    document.getElementById('sale-panel').classList.remove('visible');
    btn.classList.remove('sale-btn');
    document.getElementById('idle-text').textContent = 'Presiona Escanear';
  }
  if (isScanning) stopScan();
}

// ────────────────────────────────────────────────
// AUDIO / HAPTIC
// ────────────────────────────────────────────────
function beep(type = 'found') {
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.frequency.setValueAtTime(type === 'found' ? 880 : 440, audioCtx.currentTime);
    if (type === 'found') osc.frequency.setValueAtTime(1100, audioCtx.currentTime + 0.07);
    gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.2);
    osc.start(); osc.stop(audioCtx.currentTime + 0.25);
  } catch(e) {}
}
function vibrate(p = [80]) { if (navigator.vibrate) navigator.vibrate(p); }

// ────────────────────────────────────────────────
// TOAST
// ────────────────────────────────────────────────
let toastTimer;
function showToast(msg, type = '') {
  const el = document.getElementById('toast');
  clearTimeout(toastTimer);
  el.textContent = msg;
  el.className = 'show ' + type;
  toastTimer = setTimeout(() => { el.className = ''; }, 2800);
}

// ────────────────────────────────────────────────
// SCANNER — start / stop
// ────────────────────────────────────────────────
function toggleScan() { isScanning ? stopScan() : startScan(); }

async function startScan() {
  isScanning = true;
  recentCodes = {};

  const wrap    = document.getElementById('scanner-wrap');
  const btn     = document.getElementById('btn-scan');
  const video   = document.getElementById('scanner-video');
  const scanLine= document.getElementById('scan-line');
  const idleMsg = document.getElementById('idle-msg');

  btn.classList.add('scanning');
  document.getElementById('btn-scan-text').textContent = 'Detener';
  wrap.classList.add('active');
  if (currentMode === 'sale') wrap.classList.add('sale-mode');
  scanLine.style.display = 'block';

  // Request camera
  try {
    mediaStream = await navigator.mediaDevices.getUserMedia({
      video: {
        facingMode: { ideal: 'environment' },
        width:  { ideal: 1280 },
        height: { ideal: 720 }
      }
    });
  } catch(err) {
    showToast('No se pudo acceder a la cámara', 'error');
    _resetUI(); return;
  }

  video.srcObject = mediaStream;
  video.style.display = 'block';
  idleMsg.style.display = 'none';

  try { await video.play(); } catch(e) {}

  // Offscreen canvas for ZXing
  offCanvas = document.createElement('canvas');
  offCtx    = offCanvas.getContext('2d', { willReadFrequently: true });

  if (HAS_NATIVE) {
    // ── Path A: native BarcodeDetector (Chrome Android, Safari 17+)
    try {
      const formats = await BarcodeDetector.getSupportedFormats();
      detector = new BarcodeDetector({ formats });
    } catch(e) {
      detector = new BarcodeDetector({ formats: ['ean_13','ean_8','code_128','code_39','upc_a','upc_e','qr_code','itf','codabar'] });
    }
    scanInterval = setInterval(_nativeTick, 120);
  } else {
    // ── Path B: ZXing via esm.sh (loads once)
    if (!zxingDecoder) {
      showToast('Cargando motor de escaneo…', '');
      await _loadZXing();
    }
    scanInterval = setInterval(_zxingTick, 180);
  }
}

async function _nativeTick() {
  const video = document.getElementById('scanner-video');
  if (!isScanning || video.readyState < 2) return;
  try {
    const results = await detector.detect(video);
    if (results && results.length) onCodeFound(results[0].rawValue);
  } catch(e) {}
}

async function _zxingTick() {
  const video = document.getElementById('scanner-video');
  if (!isScanning || !zxingDecoder || video.readyState < 2) return;
  try {
    offCanvas.width  = video.videoWidth  || 640;
    offCanvas.height = video.videoHeight || 480;
    offCtx.drawImage(video, 0, 0, offCanvas.width, offCanvas.height);
    const result = await zxingDecoder.decodeFromCanvas(offCanvas);
    if (result) onCodeFound(result.getText());
  } catch(e) { /* NotFoundException is normal */ }
}

function _loadZXing() {
  return new Promise((resolve, reject) => {
    // Inject a module script that puts the reader on window
    const s = document.createElement('script');
    s.type = 'module';
    s.innerHTML = `
      import { BrowserMultiFormatReader } from 'https://esm.sh/@zxing/library@0.20.0';
      window.__zxingReader = new BrowserMultiFormatReader();
      window.dispatchEvent(new Event('zxing-ready'));
    `;
    document.head.appendChild(s);
    const onReady = () => {
      zxingDecoder = window.__zxingReader;
      resolve();
    };
    window.addEventListener('zxing-ready', onReady, { once: true });
    // Timeout fallback
    setTimeout(() => {
      if (!zxingDecoder) { showToast('Error cargando escáner', 'error'); stopScan(); }
    }, 10000);
  });
}

function stopScan() {
  isScanning = false;
  if (scanInterval) { clearInterval(scanInterval); scanInterval = null; }
  if (mediaStream)  { mediaStream.getTracks().forEach(t => t.stop()); mediaStream = null; }
  _resetUI();
}

function _resetUI() {
  const wrap    = document.getElementById('scanner-wrap');
  const video   = document.getElementById('scanner-video');
  const scanLine= document.getElementById('scan-line');
  const idleMsg = document.getElementById('idle-msg');
  const btn     = document.getElementById('btn-scan');

  btn.classList.remove('scanning');
  document.getElementById('btn-scan-text').textContent = 'Escanear';
  wrap.classList.remove('active','found','new-product','sale-mode');
  scanLine.style.display = 'none';
  video.srcObject = null;
  video.style.display = 'none';
  idleMsg.style.display = 'flex';
}

// ────────────────────────────────────────────────
// CODE HANDLER
// ────────────────────────────────────────────────
function onCodeFound(code) {
  if (!code || scanLock) return;
  const now = Date.now();
  if (recentCodes[code] && now - recentCodes[code] < 2500) return;
  recentCodes[code] = now;
  currentMode === 'sale' ? handleSaleScan(code) : handleScanMode(code);
}

function handleScanMode(code) {
  const product = getProductData(code);
  const wrap    = document.getElementById('scanner-wrap');
  const card    = document.getElementById('result-card');

  document.getElementById('result-placeholder').style.display = 'none';
  document.getElementById('result-content').style.display = 'block';
  document.getElementById('result-code').textContent = code;

  if (product) {
    document.getElementById('result-price').textContent = '$' + product.price.toFixed(2);
    document.getElementById('result-price').style.display = 'block';
    document.getElementById('result-notfound').style.display = 'none';
    const nameEl = document.getElementById('result-name');
    if (product.name) { nameEl.textContent = product.name; nameEl.style.display = 'block'; }
    else nameEl.style.display = 'none';
    card.className = 'found';
    // Flash border, keep scanning
    wrap.classList.remove('found','new-product');
    wrap.classList.add('found');
    setTimeout(() => { if (isScanning) wrap.classList.remove('found'); }, 700);
    beep('found'); vibrate([60,30,60]);
    showToast('✓ ' + (product.name || code), 'success');
  } else {
    document.getElementById('result-price').style.display = 'none';
    document.getElementById('result-name').style.display = 'none';
    document.getElementById('result-notfound').style.display = 'block';
    card.className = 'miss';
    scanLock = true;
    stopScan();
    setTimeout(() => { scanLock = false; }, 600);
    beep('miss'); vibrate([100]);
    showToast('Producto no registrado', 'error');
    openAddModal(code);
  }
}

function handleSaleScan(code) {
  const product = getProductData(code);
  const wrap    = document.getElementById('scanner-wrap');

  if (!product) {
    scanLock = true;
    stopScan();
    setTimeout(() => { scanLock = false; }, 600);
    beep('miss'); vibrate([100]);
    showToast('Producto no registrado', 'error');
    openAddModal(code);
    return;
  }

  if (saleItems[code]) saleItems[code].qty += 1;
  else saleItems[code] = { name: product.name || code, price: product.price, qty: 1 };

  wrap.classList.remove('found');
  void wrap.offsetWidth; // force reflow for re-animation
  wrap.classList.add('found');
  setTimeout(() => { if (isScanning) wrap.classList.remove('found'); }, 700);
  beep('found'); vibrate([40,20,40]);
  showToast('✓ ' + (product.name || code) + ' agregado', 'sale');
  renderSalePanel();
}

// ────────────────────────────────────────────────
// SALE
// ────────────────────────────────────────────────
function renderSalePanel() {
  const list    = document.getElementById('sale-items-list');
  const totalEl = document.getElementById('sale-total');
  const countEl = document.getElementById('sale-count');
  const keys    = Object.keys(saleItems);

  if (!keys.length) {
    list.innerHTML = '<div class="empty-state" style="padding:16px 0;font-size:11px">Escanea productos para agregar</div>';
    totalEl.textContent = '$0.00'; countEl.textContent = '0 productos'; return;
  }

  let total = 0, totalQty = 0;
  list.innerHTML = keys.map(code => {
    const it = saleItems[code];
    const sub = it.price * it.qty;
    total += sub; totalQty += it.qty;
    return `<div class="sale-item">
      <div class="sale-item-info">
        <div class="sale-item-name">${escHtml(it.name)}</div>
        <div class="sale-item-code">${code} · $${it.price.toFixed(2)} c/u</div>
      </div>
      <div class="sale-item-qty">
        <button class="qty-btn" onclick="changeSaleQty('${code}',-1)">−</button>
        <span class="qty-num">${it.qty}</span>
        <button class="qty-btn" onclick="changeSaleQty('${code}',1)">+</button>
      </div>
      <span class="sale-item-price">$${sub.toFixed(2)}</span>
      <button class="sale-item-del" onclick="removeSaleItem('${code}')">✕</button>
    </div>`;
  }).join('');

  totalEl.textContent = '$' + total.toFixed(2);
  countEl.textContent = totalQty + (totalQty === 1 ? ' producto' : ' productos');
}

function changeSaleQty(code, d) {
  if (!saleItems[code]) return;
  saleItems[code].qty = Math.max(1, saleItems[code].qty + d);
  renderSalePanel();
}
function removeSaleItem(code) { delete saleItems[code]; renderSalePanel(); }
function cancelSale() {
  if (!Object.keys(saleItems).length) { showToast('No hay venta activa', 'error'); return; }
  saleItems = {}; renderSalePanel(); showToast('Venta cancelada', 'error');
}

function finishSale() {
  const keys = Object.keys(saleItems);
  if (!keys.length) { showToast('Agrega productos primero', 'error'); return; }
  if (isScanning) stopScan();
  let total = 0;
  document.getElementById('summary-items-container').innerHTML =
    keys.map(code => {
      const it = saleItems[code], sub = it.price * it.qty;
      total += sub;
      return `<div class="summary-item">
        <div class="summary-item-left">
          <div class="summary-item-name">${escHtml(it.name)}</div>
          <div class="summary-item-detail">${code} · ${it.qty} × $${it.price.toFixed(2)}</div>
        </div>
        <div class="summary-item-price">$${sub.toFixed(2)}</div>
      </div>`;
    }).join('') +
    `<div class="summary-grand-total">
      <span class="summary-grand-label">Total</span>
      <span class="summary-grand-amount">$${total.toFixed(2)}</span>
    </div>`;
  document.getElementById('sale-summary-modal').classList.add('show');
}

function closeSaleSummary() {
  document.getElementById('sale-summary-modal').classList.remove('show');
  saleItems = {}; renderSalePanel();
  showToast('✓ Venta completada', 'success');
  beep('found'); vibrate([40,20,40,20,40]);
}

function exportSaleExcel() {
  const keys = Object.keys(saleItems);
  if (!keys.length) { showToast('Sin datos de venta', 'error'); return; }
  let total = 0;
  const rows = keys.map(code => {
    const it = saleItems[code], sub = it.price * it.qty;
    total += sub;
    return { 'Código': code, 'Nombre': it.name, 'Precio Unit.': it.price, 'Cantidad': it.qty, 'Subtotal': sub };
  });
  rows.push({ 'Código':'','Nombre':'TOTAL','Precio Unit.':'','Cantidad':'','Subtotal': total });
  const ws = XLSX.utils.json_to_sheet(rows);
  ws['!cols'] = [{wch:18},{wch:28},{wch:14},{wch:10},{wch:14}];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Venta');
  XLSX.writeFile(wb, `venta_${new Date().toISOString().slice(0,10)}.xlsx`);
  showToast('✓ Excel de venta exportado', 'success');
}

// ────────────────────────────────────────────────
// MODALS — Add / Edit
// ────────────────────────────────────────────────
function openAddModal(code) {
  document.getElementById('form-code').value  = code;
  document.getElementById('form-name').value  = '';
  document.getElementById('form-price').value = '';
  document.getElementById('add-modal').classList.add('show');
  setTimeout(() => document.getElementById('form-name').focus(), 350);
}
function closeAddModal() { document.getElementById('add-modal').classList.remove('show'); }

function saveProduct() {
  const code  = document.getElementById('form-code').value.trim();
  const name  = document.getElementById('form-name').value.trim();
  const price = parseFloat(document.getElementById('form-price').value);
  if (!code) { showToast('Código inválido', 'error'); return; }
  if (isNaN(price) || price < 0) { showToast('Ingresa un precio válido', 'error'); return; }
  setProductData(code, { price, name });
  closeAddModal();
  showToast('✓ Producto guardado', 'success');
  beep('found'); vibrate([40,20,40]);
  if (currentMode === 'scan') {
    document.getElementById('result-price').textContent = '$' + price.toFixed(2);
    document.getElementById('result-price').style.display = 'block';
    document.getElementById('result-notfound').style.display = 'none';
    const nameEl = document.getElementById('result-name');
    if (name) { nameEl.textContent = name; nameEl.style.display = 'block'; }
    document.getElementById('result-card').className = 'found';
  } else {
    if (saleItems[code]) saleItems[code].qty += 1;
    else saleItems[code] = { name: name || code, price, qty: 1 };
    renderSalePanel();
  }
}

function openEditModal(code) {
  const p = getProductData(code);
  document.getElementById('edit-code').value  = code;
  document.getElementById('edit-name').value  = p ? p.name  : '';
  document.getElementById('edit-price').value = p ? p.price : '';
  document.getElementById('edit-modal').classList.add('show');
  setTimeout(() => document.getElementById('edit-name').focus(), 350);
}
function closeEditModal() { document.getElementById('edit-modal').classList.remove('show'); }

function saveEdit() {
  const code  = document.getElementById('edit-code').value.trim();
  const name  = document.getElementById('edit-name').value.trim();
  const price = parseFloat(document.getElementById('edit-price').value);
  if (isNaN(price) || price < 0) { showToast('Precio inválido', 'error'); return; }
  setProductData(code, { price, name });
  closeEditModal(); renderList();
  showToast('✓ Producto actualizado', 'success');
}

// ────────────────────────────────────────────────
// LIST MODAL
// ────────────────────────────────────────────────
function openList() { renderList(); document.getElementById('list-modal').classList.add('show'); }
function closeList() { document.getElementById('list-modal').classList.remove('show'); }

function renderList() {
  const products = getProducts();
  const keys = Object.keys(products);
  const c = document.getElementById('product-list-container');
  if (!keys.length) { c.innerHTML = '<div class="empty-state">Sin productos guardados</div>'; return; }
  c.innerHTML = keys.map(code => {
    const d = getProductData(code);
    return `<div class="product-item">
      <div class="product-info">
        ${d && d.name ? `<div class="product-name-display">${escHtml(d.name)}</div>` : ''}
        <div class="product-code">${code}</div>
      </div>
      <div class="product-price-badge">$${(d ? d.price : 0).toFixed(2)}</div>
      <button class="btn-edit"   onclick="openEditModal('${code}')">✏️</button>
      <button class="btn-delete" onclick="deleteProduct('${code}')">✕</button>
    </div>`;
  }).join('');
}

function deleteProduct(code) {
  const p = getProducts(); delete p[code]; saveProducts(p);
  renderList(); showToast('Producto eliminado', 'error'); vibrate([40]);
}

// ────────────────────────────────────────────────
// EXCEL
// ────────────────────────────────────────────────
function exportExcel() {
  const keys = Object.keys(getProducts());
  if (!keys.length) { showToast('Sin productos para exportar', 'error'); return; }
  const rows = keys.map(code => {
    const d = getProductData(code);
    return { 'Código': code, 'Nombre': d ? d.name : '', 'Precio': d ? d.price : 0 };
  });
  const ws = XLSX.utils.json_to_sheet(rows);
  ws['!cols'] = [{wch:20},{wch:30},{wch:12}];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Productos');
  XLSX.writeFile(wb, 'productos_scanprice.xlsx');
  showToast('✓ Excel exportado', 'success');
}

function importExcel(event) {
  const file = event.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const wb   = XLSX.read(new Uint8Array(e.target.result), { type: 'array' });
      const rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
      if (!rows.length) { showToast('Archivo vacío o inválido', 'error'); return; }
      const products = getProducts();
      let count = 0;
      rows.forEach(row => {
        const code  = String(row['Código'] || row['Codigo'] || row['code'] || '').trim();
        const price = parseFloat(row['Precio'] || row['price'] || 0);
        const name  = String(row['Nombre'] || row['nombre'] || row['name'] || '').trim();
        if (code && !isNaN(price)) { products[code] = { price, name }; count++; }
      });
      saveProducts(products); renderList();
      showToast(`✓ ${count} productos importados`, 'success');
    } catch(err) { showToast('Error al leer el archivo', 'error'); }
  };
  reader.readAsArrayBuffer(file);
  event.target.value = '';
}

// ────────────────────────────────────────────────
// BACKDROP CLOSE
// ────────────────────────────────────────────────
['add-modal','edit-modal','list-modal','sale-summary-modal'].forEach(id => {
  document.getElementById(id).addEventListener('click', function(e) {
    if (e.target === this) this.classList.remove('show');
  });
});

// ────────────────────────────────────────────────
// KEYBOARD SHORTCUTS
// ────────────────────────────────────────────────
document.getElementById('form-name').addEventListener('keydown',  e => { if (e.key==='Enter') document.getElementById('form-price').focus(); });
document.getElementById('form-price').addEventListener('keydown', e => { if (e.key==='Enter') saveProduct(); });
document.getElementById('edit-name').addEventListener('keydown',  e => { if (e.key==='Enter') document.getElementById('edit-price').focus(); });
document.getElementById('edit-price').addEventListener('keydown', e => { if (e.key==='Enter') saveEdit(); });

// ────────────────────────────────────────────────
// UTILS
// ────────────────────────────────────────────────
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Init
setMode('scan');
</script>
</body>
</html>
